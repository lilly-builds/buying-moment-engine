name: Security

# Supply-chain + SAST + secret scanning (COV-03). Runs on every push and PR, and
# weekly so a newly-disclosed CVE in an unchanged dependency is still caught.
on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependencies:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Fails on high/critical advisories; moderate/low are reported, not blocking.
      - name: pnpm audit (fail on high or critical)
        run: pnpm audit --audit-level=high

  sast:
    name: Static analysis (Semgrep OWASP Top Ten)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # No SEMGREP_APP_TOKEN needed: SEMGREP_RULES drives a token-less CI scan.
      - name: Semgrep scan
        run: semgrep ci
        env:
          SEMGREP_RULES: p/owasp-top-ten

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          # Auto-provided by Actions; not a manually-managed secret. NOTE: a private
          # repo under a GitHub org additionally needs a GITLEAKS_LICENSE secret.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
  pull_request:

# Only the newest run per ref matters; cancel superseded ones (COV-02).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Data-layer + integration tests run against in-process PGlite (real SQL,
      # no service container needed). Runs with the v8 coverage gate: the run exits
      # non-zero if coverage falls below the floor in vitest.config.ts (COV-02).
      - name: Test (with coverage gate)
        run: pnpm test:coverage

      # A change can typecheck + lint + test green but still break `next build`
      # (server/client boundary, static-generation failure). Gate it (COV-02).
      - name: Build
        run: pnpm build
